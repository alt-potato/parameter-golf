resources:
  cloud: runpod
  # accelerators: A40:1 # smoke test
  # accelerators: H100:1 # cheaper test run, but it's never available T-T
  accelerators: H100-SXM:1 # test run
  # accelerators: H100-SXM:8 # scoring run
  image_id: docker:runpod/parameter-golf:latest
  use_spot: false # don't seem to be a lot of spot instances tbh...

workdir: .

setup: |
  # replace default dir with symlink to synced workdir (just in case)
  mkdir -p /workspace
  rm -rf /workspace/parameter-golf
  ln -s ~/sky_workdir /workspace/parameter-golf

  # download cached FineWeb dataset (1024-token vocabulary)
  python3 data/cached_challenge_fineweb.py --variant sp1024

# WARNING: modify nproc_per_node to match GPU count
run: |
  cd /workspace/parameter-golf

  # create/clean export folder
  mkdir -p /workspace/export

  RUN_ID=test_sp1024 \
  torchrun --standalone --nproc_per_node=1 train_gpt.py | tee /workspace/export/train.log
